version: "3.8"

services:
  # ===================
  # Nginx Reverse Proxy
  # ===================
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/static:/var/www/static:ro
      - certbot-webroot:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      - ghost
      - ghost-2
      - api
    networks:
      - internal

  # ===================
  # Ghost CMS (sandbox)
  # ===================
  ghost:
    image: ghost:5-alpine
    restart: always
    environment:
      url: http://95.163.230.43
      database__client: mysql
      database__connection__host: ghost-db
      database__connection__user: ghost
      database__connection__password: ghostdbpass
      database__connection__database: ghost
      mail__transport: Direct
    volumes:
      - ghost-content:/var/lib/ghost/content
    depends_on:
      - ghost-db
    networks:
      - internal

  # ===================
  # Ghost CMS 2 (notes.editors.one)
  # ===================
  ghost-2:
    image: ghost:5-alpine
    restart: always
    environment:
      url: https://notes.editors.one
      database__client: mysql
      database__connection__host: ghost-db
      database__connection__user: ghost2
      database__connection__password: ghost2dbpass
      database__connection__database: ghost2
      mail__transport: Direct
    volumes:
      - ghost-2-content:/var/lib/ghost/content
    depends_on:
      - ghost-db
    networks:
      - internal

  ghost-db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_USER: ghost
      MYSQL_PASSWORD: ghostdbpass
      MYSQL_DATABASE: ghost
    volumes:
      - ghost-db-data:/var/lib/mysql
    networks:
      - internal

  # ===================
  # SEO Blog Service
  # ===================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    shm_size: '256m'
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://seo:seopass@postgres:5432/seoblog
      REDIS_URL: redis://redis:6379/0
      GHOST_URL: http://ghost:2368
      GHOST_ADMIN_KEY: ${GHOST_ADMIN_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_PROXY_URL: ${ANTHROPIC_PROXY_URL}
      ANTHROPIC_PROXY_SECRET: ${ANTHROPIC_PROXY_SECRET}
      SERPER_API_KEY: ${SERPER_API_KEY}
      DATAFORSEO_LOGIN: ${DATAFORSEO_LOGIN}
      DATAFORSEO_PASSWORD: ${DATAFORSEO_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      AUTH_EMAIL: ${AUTH_EMAIL}
      AUTH_PASSWORD_HASH: ${AUTH_PASSWORD_HASH}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_PROXY_URL: ${OPENAI_PROXY_URL}
      YANDEX_WORDSTAT_API_KEY: ${YANDEX_WORDSTAT_API_KEY:-}
      YANDEX_CLOUD_FOLDER_ID: ${YANDEX_CLOUD_FOLDER_ID:-}
      RUSH_ANALYTICS_API_KEY: ${RUSH_ANALYTICS_API_KEY:-}
      JINA_API_KEY: ${JINA_API_KEY:-}
      TOPVISOR_USER_ID: ${TOPVISOR_USER_ID:-}
      TOPVISOR_ACCESS_TOKEN: ${TOPVISOR_ACCESS_TOKEN:-}
      TOPVISOR_PROJECT_ID: ${TOPVISOR_PROJECT_ID:-}
      INDEXNOW_KEY: ${INDEXNOW_KEY:-}
      UNISENDER_API_KEY: ${UNISENDER_API_KEY:-}
      UPLOAD_DIR: ${UPLOAD_DIR:-/data/uploads}
    volumes:
      - ./src:/app/src
      - uploads-data:/data/uploads
    depends_on:
      - postgres
      - redis
    networks:
      - internal

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: seo
      POSTGRES_PASSWORD: seopass
      POSTGRES_DB: seoblog
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis-data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - internal

  # ===================
  # Task Worker (будет позже)
  # ===================
  # worker:
  #   build: .
  #   command: python -m src.worker
  #   environment:
  #     DATABASE_URL: postgresql://seo:seopass@postgres:5432/seoblog
  #     REDIS_URL: redis://redis:6379/0
  #   depends_on:
  #     - postgres
  #     - redis
  #   networks:
  #     - internal

networks:
  internal:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1450

volumes:
  ghost-content:
  ghost-2-content:
  ghost-db-data:
  postgres-data:
  redis-data:
  uploads-data:
  certbot-webroot:
  certbot-certs:
