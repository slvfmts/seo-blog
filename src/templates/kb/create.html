{% extends "base.html" %}

{% block title %}Новая папка — Фактура — SEO Blog{% endblock %}

{% block content %}
<div class="mb-6">
    <a href="/ui/kb" class="text-sm text-gray-500 hover:text-gray-700">&larr; Назад к папкам</a>
</div>

<div class="bg-white shadow sm:rounded-lg">
    <div class="px-4 py-5 sm:p-6">
        <h1 class="text-2xl font-bold text-gray-900 mb-6">Новая папка</h1>

        <form method="POST" action="/ui/kb/new">
            <div class="space-y-4">
                <div>
                    <label for="name" class="block text-sm font-medium text-gray-700">Название</label>
                    <input
                        type="text"
                        name="name"
                        id="name"
                        required
                        class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm"
                        placeholder="Например: Документация продукта"
                    >
                </div>
                <div>
                    <label for="description" class="block text-sm font-medium text-gray-700">Описание (опционально)</label>
                    <textarea
                        name="description"
                        id="description"
                        rows="3"
                        class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm"
                        placeholder="Краткое описание содержимого папки"
                    ></textarea>
                </div>
            </div>
            <div class="mt-6">
                <button type="submit" class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-indigo-600 hover:bg-indigo-700">
                    Создать
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
